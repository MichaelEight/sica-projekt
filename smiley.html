<!DOCTYPE html>
<html>
<head>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: white; }
    .face {
      width: 200px; height: 200px;
      background: #FFD93D;
      border-radius: 20px;
      position: relative;
      border: 3px solid #333;
    }
    .eye {
      width: 20px; height: 28px;
      background: #333;
      border-radius: 50%;
      position: absolute;
      top: 55px;
    }
    .eye.left { left: 50px; }
    .eye.right { right: 50px; }
    .smile {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="face">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="smile">
      <svg width="90" height="50" viewBox="0 0 90 50">
        <path d="M 10 10 Q 45 50 80 10" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</body>
</html>
