<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f6f8; color: #1a1a2e; width: 100vw; height: 100vh; overflow: hidden; }
  .topbar { height: 48px; background: #1a1a2e; display: flex; align-items: center; padding: 0 14px; gap: 8px; }
  .logo { color: #fff; font-size: 15px; font-weight: 600; white-space: nowrap; flex-shrink: 0; } .logo span { color: #4a9eff; }
  .sep { width: 1px; height: 24px; background: #444; flex-shrink: 0; }
  .file-info { font-size: 12px; color: #ccc; font-family: monospace; white-space: nowrap; }
  .spacer { flex: 1; }
  .seg { display: flex; border-radius: 5px; overflow: hidden; flex-shrink: 0; }
  .seg-btn { font-size: 12px; padding: 6px 12px; border: none; cursor: pointer; font-weight: 500; background: #2a2a40; color: #888; white-space: nowrap; flex-shrink: 0; }
  .seg-btn.active { background: #4a9eff; color: #fff; }
  .tb { font-size: 12px; padding: 6px 10px; border-radius: 5px; border: none; background: #2a2a40; color: #ccc; cursor: pointer; white-space: nowrap; }
  .tb.active { background: #4a9eff; color: #fff; }
  .btn-primary { background: #4a9eff; color: #fff; font-size: 12px; padding: 6px 14px; border-radius: 5px; border: none; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .btn-sec { background: #2a2a40; color: #ccc; font-size: 12px; padding: 6px 14px; border-radius: 5px; border: none; white-space: nowrap; flex-shrink: 0; }

  .content { display: flex; height: calc(100vh - 48px - 28px); }
  .lead-sidebar { width: 58px; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 6px; gap: 3px; align-items: center; }
  .lead-btn { width: 46px; height: 32px; border: 1px solid #e5e7eb; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: monospace; background: #fff; color: #9ca3af; display: flex; align-items: center; justify-content: center; }
  .lead-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
  .lead-divider { width: 36px; height: 1px; background: #e5e7eb; margin: 2px 0; }

  .graph-area { flex: 1; background: #fff; border: 1.5px solid #d1d5db; margin: 6px; border-radius: 6px; position: relative; overflow: hidden; }
  .lead-title { position: absolute; top: 10px; left: 14px; font-size: 18px; font-weight: 700; font-family: monospace; color: #1a1a2e; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 3px; z-index: 2; }

  /* Rulers */
  .v-ruler { position: absolute; left: 0; top: 0; bottom: 24px; width: 50px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px 0; z-index: 2; }
  .v-tick { font-size: 10px; font-family: monospace; color: #9ca3af; text-align: right; padding-right: 4px; }
  .t-ruler { position: absolute; bottom: 0; left: 50px; right: 0; height: 20px; display: flex; justify-content: space-between; padding: 0 4px; z-index: 2; }
  .t-tick { font-size: 10px; font-family: monospace; color: #9ca3af; }

  .statusbar { height: 28px; background: #fff; border-top: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 14px; gap: 16px; }
  .st { font-size: 11px; color: #6b7280; font-family: monospace; } .st b { color: #1a1a2e; }
  .st-center { flex: 1; text-align: center; font-size: 10px; color: #9ca3af; }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="topbar">
    <div class="logo"><span>EKG</span> Assistant</div><div class="sep"></div>
    <div class="file-info">00888_lr.dat | 500 Hz | 12 odpr. | 10.0 s</div><div class="spacer"></div>
    <div class="seg"><button class="seg-btn">12-Lead</button><button class="seg-btn active">1-Lead</button><button class="seg-btn">Monitor</button></div>
    <div class="sep"></div>
    <button class="tb active">Wybierz</button><button class="tb">Suwmiarka</button><button class="tb">Adnotacja</button>
    <div class="sep"></div>
    <button class="tb">10 mm/mV</button><button class="tb">25 mm/s</button><button class="tb">0.05-150 Hz</button>
    <div class="sep"></div>
    <button class="btn-primary">Analizuj</button><button class="btn-sec">Wczytaj plik</button>
  </div>
  <div class="content">
    <div class="lead-sidebar">
      <button class="lead-btn">I</button><button class="lead-btn active">II</button><button class="lead-btn">III</button>
      <div class="lead-divider"></div>
      <button class="lead-btn">aVR</button><button class="lead-btn">aVL</button><button class="lead-btn">aVF</button>
      <div class="lead-divider"></div>
      <button class="lead-btn">V1</button><button class="lead-btn">V2</button><button class="lead-btn">V3</button>
      <button class="lead-btn">V4</button><button class="lead-btn">V5</button><button class="lead-btn">V6</button>
    </div>
    <div class="graph-area">
      <div class="lead-title">II</div>
      <div class="v-ruler">
        <span class="v-tick">2.0</span><span class="v-tick">1.5</span><span class="v-tick">1.0</span><span class="v-tick">0.5</span>
        <span class="v-tick">0</span><span class="v-tick">-0.5</span><span class="v-tick">-1.0</span><span class="v-tick">-1.5</span><span class="v-tick">-2.0</span>
      </div>
      <div class="t-ruler">
        <span class="t-tick">0s</span><span class="t-tick">1s</span><span class="t-tick">2s</span><span class="t-tick">3s</span><span class="t-tick">4s</span>
        <span class="t-tick">5s</span><span class="t-tick">6s</span><span class="t-tick">7s</span><span class="t-tick">8s</span><span class="t-tick">9s</span><span class="t-tick">10s</span>
      </div>
      <canvas id="c"></canvas>
    </div>
  </div>
  <div class="statusbar">
    <div class="st"><b>10 mm/mV</b> | <b>25 mm/s</b></div>
    <div class="st-center">Tab: Następne | Shift+Tab: Poprzednie | ←/→: Przewiń</div>
    <div class="st">t = <b>4.16 s</b> | V = <b>0.92 mV</b></div>
  </div>
  <script>
    const canvas = document.getElementById('c');
    requestAnimationFrame(() => {
      const parent = canvas.parentElement;
      const W = canvas.width = parent.offsetWidth * 2;
      const H = canvas.height = parent.offsetHeight * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      const w = parent.offsetWidth, h = parent.offsetHeight;
      const SX = w / 250, LX = SX * 5, SY = h / 80, LY = SY * 5;
      const midY = h / 2, mvPx = h / 8;

      ctx.strokeStyle = '#FCE4E4'; ctx.lineWidth = 0.4; ctx.beginPath();
      for (let x = 0; x < w; x += SX) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
      for (let y = 0; y < h; y += SY) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
      ctx.stroke();
      ctx.strokeStyle = '#F0BFBF'; ctx.lineWidth = 0.8; ctx.beginPath();
      for (let x = 0; x < w; x += LX) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
      for (let y = 0; y < h; y += LY) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
      ctx.stroke();

      function ekg(t) {
        const period = 0.833, phase = ((t % period) / period) * 2 * Math.PI;
        let v = 0.12 * Math.exp(-Math.pow(phase - 0.9, 2) / 0.03);
        v -= 0.08 * Math.exp(-Math.pow(phase - 1.55, 2) / 0.004);
        v += 1.0 * Math.exp(-Math.pow(phase - 1.65, 2) / 0.005);
        v -= 0.15 * Math.exp(-Math.pow(phase - 1.78, 2) / 0.004);
        v += 0.2 * Math.exp(-Math.pow(phase - 2.8, 2) / 0.06);
        return v;
      }

      const calW = w * 0.02;
      ctx.strokeStyle = '#1A1A2E'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(4, midY); ctx.lineTo(6, midY); ctx.lineTo(6, midY - mvPx);
      ctx.lineTo(6 + calW, midY - mvPx); ctx.lineTo(6 + calW, midY); ctx.stroke();
      const ss = 6 + calW + 6, sw = w - ss;
      ctx.beginPath();
      for (let px = 0; px < sw; px++) { const t = (px / sw) * 10, v = ekg(t), py = midY - v * mvPx; px === 0 ? ctx.moveTo(ss + px, py) : ctx.lineTo(ss + px, py); }
      ctx.stroke();
    });
  </script>
</body>
</html>
